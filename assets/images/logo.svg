<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Outer circle -->
  <circle cx="24" cy="24" r="22" fill="url(#grad)" />

  <!-- Balloon string -->
  <path d="M24 32 Q22 38 21 42" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Main balloon body -->
  <ellipse cx="24" cy="20" rx="9" ry="11" fill="rgba(255,255,255,0.92)"/>

  <!-- Balloon shine -->
  <ellipse cx="21" cy="16" rx="3" ry="4" fill="rgba(255,255,255,0.5)" transform="rotate(-15 21 16)"/>

  <!-- Balloon knot -->
  <circle cx="24" cy="31" r="1.6" fill="rgba(255,255,255,0.85)"/>

  <!-- Small star top-right -->
  <text x="33" y="13" font-size="6" fill="rgba(255,255,255,0.9)">✦</text>

  <!-- Small star bottom-left -->
  <text x="10" y="34" font-size="4" fill="rgba(255,255,255,0.65)">✦</text>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff6b9d"/>
      <stop offset="50%"  stop-color="#ff9a7c"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
  </defs>
</svg>
